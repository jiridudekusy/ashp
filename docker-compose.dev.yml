services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ashp-dev
    privileged: true
    volumes:
      - .:/workspace
      - node_modules:/workspace/server/node_modules
      - gui_node_modules:/workspace/gui/node_modules
      - dev_home:/home/dev
    working_dir: /workspace
    ports:
      - "9080:8080"
      - "9030:3000"
      - "5173:5173"
      - "51463:51463"
    stdin_open: true
    tty: true

volumes:
  node_modules:
  gui_node_modules:
  dev_home:
