services:
  ashp:
    image: jiridudekusy/ashp:latest
    networks:
      default:
      ashp-sandbox:
    ports:
      - "8080:8080"
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./ashp.json:/etc/ashp/ashp.json:ro
    environment:
      - ASHP_DB_KEY=dev-db-key-change-in-production
      - ASHP_LOG_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      - ASHP_CA_KEY=dev-ca-key-change-in-production
      - ASHP_TRANSPARENT=true
      # Set ASHP_TRANSPARENT_IP when container has multiple networks, to ensure
      # dnsmasq catch-all resolves to the IP visible from sandbox containers.
      # Without this, auto-detect may pick the wrong network's IP.
      # - ASHP_TRANSPARENT_IP=172.30.0.2

  sandbox-transparent:
    build:
      context: ../sandbox
    container_name: ashp-sandbox-transparent
    networks:
      - ashp-sandbox
    volumes:
      - transparent_home:/home/dev
      - ../sandbox/workspace:/workspace
    environment:
      - ASHP_AGENT_NAME=agent-transparent
      - ASHP_AGENT_TOKEN=${ASHP_TRANSPARENT_AGENT_TOKEN:-changeme}
      - NODE_EXTRA_CA_CERTS=/home/dev/ashp-ca.crt
    stdin_open: true
    tty: true

networks:
  ashp-sandbox:
    name: ashp-sandbox
    internal: true

volumes:
  transparent_home:
